name: Build & Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Daily at 00:00 UTC (08:00 Asia/Shanghai) — refreshes blog.posts from RSS and submodules.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare site assets
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
    steps:
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.FLYBAY_DEPLOY_KEY }}

      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch submodules via SSH (update to latest remote)
        run: git submodule update --init --recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Refresh blog and gate scheduled runs
        id: gate
        run: |
          npm run gen:blog
          if [[ "${{ github.event_name }}" == "schedule" ]] && git diff --quiet; then
            echo "Scheduled run with no changes — skipping build & deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit submodule and site.json updates
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site.json site.cn.json
          git diff --cached --quiet || git commit -m "chore(ci): update submodules and blog posts [skip ci]"
          git push origin main

      - run: npm run gen:lqip
        if: steps.gate.outputs.skip != 'true'

      - run: npm run sync:flybay
        if: steps.gate.outputs.skip != 'true'

      - name: Upload prepared site sources
        if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: site-sources
          path: |
            site.json
            site.cn.json
          retention-days: 1

  build-com:
    name: Build → com branch
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.FLYBAY_DEPLOY_KEY }}

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Fetch submodules via SSH
        run: git submodule update --init --recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Restore prepared site sources
        uses: actions/download-artifact@v4
        with:
          name: site-sources

      - run: npm run build
        env:
          SITE_VARIANT: com

      - name: Deploy to com branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: com
          publish_dir: ./out
          force_orphan: true

  build-cn:
    name: Build → cn branch
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.FLYBAY_DEPLOY_KEY }}

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Fetch submodules via SSH
        run: git submodule update --init --recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Restore prepared site sources
        uses: actions/download-artifact@v4
        with:
          name: site-sources

      - run: npm run build
        env:
          SITE_VARIANT: cn

      - name: Deploy to cn branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: cn
          publish_dir: ./out
          force_orphan: true
