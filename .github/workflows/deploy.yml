name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-com:
    name: Build → com branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          SITE_VARIANT: com

      - name: Deploy to com branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: com
          publish_dir: ./out
          force_orphan: true

  build-cn:
    name: Build → cn branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          SITE_VARIANT: cn

      - name: Deploy to cn branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: cn
          publish_dir: ./out
          force_orphan: true
